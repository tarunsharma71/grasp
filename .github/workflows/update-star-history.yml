name: Update Star History

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  update-star-history:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Generate star history svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-star-history.mjs

      - name: Commit refreshed svg
        run: |
          if git diff --quiet -- star-history.svg; then
            echo "star-history.svg unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add star-history.svg
          git commit -m "chore: update star history svg"
          git push origin HEAD:${GITHUB_REF_NAME}
